spring.application.name=reservas

# H2 in MySQL compatibility mode for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate - fresh schema per test run
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# No seed data in unit tests
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# JWT test config
jwt.secret=ZmFrZS1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1wbGVhc2UtbWluLTMyLWNoYXJz
jwt.expiration-hours=1
jwt.issuer=reservas-app

# Rate limit test config
ratelimit.max-attempts=5
ratelimit.window-seconds=60
ratelimit.lockout-minutes=15
