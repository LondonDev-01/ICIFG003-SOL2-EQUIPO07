spring.application.name=reservas

# Configuración de base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (cambiar en producción con env vars)
jwt.secret=ZmFrZS1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1wbGVhc2UtbWluLTMyLWNoYXJz
jwt.expiration-hours=1
jwt.issuer=reservas-app

# Rate Limit Configuration
ratelimit.max-attempts=5
ratelimit.window-seconds=60
ratelimit.lockout-minutes=15

# Ejecutar data.sql DESPUES de que Hibernate cree el schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always