spring.application.name=reservas

# Configuracion de base de datos MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:reservas_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
# REQ7: Hibernate crea el esquema (tablas) desde las entidades JPA al iniciar.
# No existe DDL manual: ninguna schema.sql, ni Flyway/Liquibase, ni scripts.
# update: crea las tablas que faltan y deja intactas las existentes.
# No se define dialecto explicito: Hibernate 7 lo detecta automaticamente desde el JDBC metadata.
# PhysicalNamingStrategyStandardImpl respeta los nombres exactos de @Table/@Column
# (evita que Spring Boot convierta CARRERA a carrera en MySQL con lower_case_table_names=0).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (cambiar en produccion con env vars)
jwt.secret=${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1wbGVhc2UtbWluLTMyLWNoYXJz}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:1}
jwt.issuer=${JWT_ISSUER:reservas-app}

# Rate Limit Configuration
ratelimit.max-attempts=${RATELIMIT_MAX_ATTEMPTS:5}
ratelimit.window-seconds=${RATELIMIT_WINDOW_SECONDS:60}
ratelimit.lockout-minutes=${RATELIMIT_LOCKOUT_MINUTES:15}

# REQ5: Carga de datos iniciales (DML via Spring Boot sql.init).
# Orden de bootstrap:
#  1) Hibernate crea/actualiza el esquema (ddl-auto=update, REQ7).
#  2) defer-datasource-initialization=true retrasa data.sql hasta
#     despues de que el EntityManagerFactory este inicializado,
#     garantizando que las tablas existan antes de los INSERT.
#  3) spring.sql.init.mode=always ejecuta data.sql en cada arranque.
# data.sql es puro DML (INSERT IGNORE -> idempotente);
# NO contiene DDL y NO hay schema.sql en el proyecto.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
