spring.application.name=reservas

# Configuración de base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
# REQ7: Hibernate crea el esquema (tablas) desde las entidades JPA al iniciar.
# No existe DDL manual: ninguna schema.sql, ni Flyway/Liquibase, ni scripts.
# update: crea las tablas que faltan y deja intactas las existentes.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (cambiar en producción con env vars)
jwt.secret=ZmFrZS1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1wbGVhc2UtbWluLTMyLWNoYXJz
jwt.expiration-hours=1
jwt.issuer=reservas-app

# Rate Limit Configuration
ratelimit.max-attempts=5
ratelimit.window-seconds=60
ratelimit.lockout-minutes=15

# REQ5: Carga de datos iniciales (DML via Spring Boot sql.init).
# Orden de bootstrap:
#  1) Hibernate crea/actualiza el esquema (ddl-auto=update, REQ7).
#  2) defer-datasource-initialization=true retrasa data.sql hasta
#     despues de que el EntityManagerFactory este inicializado,
#     garantizando que las tablas existan antes de los INSERT.
#  3) spring.sql.init.mode=always ejecuta data.sql en cada arranque.
# data.sql es puro DML (ON CONFLICT DO NOTHING -> idempotente);
# NO contiene DDL y NO hay schema.sql en el proyecto.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
