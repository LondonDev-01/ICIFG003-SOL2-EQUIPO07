<nav class="navbar">
  <div class="logo-container">
    <img src="logo-biblioteca.png" alt="Logo Biblioteca" class="logo-img">
  </div>

  <ul class="nav-links">
    <li>
      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }">
        Inicio
      </a>
    </li>

    <li><a routerLink="/salas" routerLinkActive="active-link">Salas</a></li>
    <li *ngIf="isAuthenticated()"><a routerLink="/mis-reservas" routerLinkActive="active-link">Mis reservas</a></li>
    <li><a routerLink="/ayuda" routerLinkActive="active-link">Ayuda</a></li>
    <li><a routerLink="/contacto" routerLinkActive="active-link">Contacto</a></li>
  </ul>

  <div class="nav-auth">
    <ng-container *ngIf="!isAuthenticated()">
      <a routerLink="/login" class="btn-auth">Iniciar sesión</a>
      <a routerLink="/register" class="btn-auth btn-register">Registrarse</a>
    </ng-container>
    <ng-container *ngIf="isAuthenticated()">
      <span class="user-greeting">Hola, {{ currentUser()?.nombre }}</span>
      <button (click)="logout()" class="btn-logout">Salir</button>
    </ng-container>
  </div>
</nav>
