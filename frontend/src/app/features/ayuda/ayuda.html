<div class="ayuda-container">
  <div class="ayuda-content">
    <h1>Centro de Ayuda</h1>
    <p class="ayuda-intro">Aquí encontrarás respuestas a las preguntas más frecuentes sobre nuestro sistema de reservas.</p>

    <!-- Pasos para reservar -->
    <section class="pasos-section">
      <h2>Pasos para Reservar una Sala</h2>
      <div class="pasos-grid">
        <div *ngFor="let paso of pasos" class="paso-card">
          <div class="paso-numero">{{ paso.numero }}</div>
          <h3>{{ paso.titulo }}</h3>
          <p>{{ paso.descripcion }}</p>
        </div>
      </div>
    </section>

    <!-- Preguntas Frecuentes -->
    <section class="faq-section">
      <h2>Preguntas Frecuentes</h2>
      <div class="faq-list">
        <div 
          *ngFor="let faq of faqs; let i = index" 
          class="faq-item"
          [class.abierto]="faq.abierto">
          <div class="faq-pregunta" (click)="toggleFaq(i)">
            <h3>{{ faq.pregunta }}</h3>
            <i class="bi" [ngClass]="faq.abierto ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
          </div>
          <div class="faq-respuesta" *ngIf="faq.abierto">
            <p>{{ faq.respuesta }}</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Información adicional -->
    
  </div>
</div>
