<div class="login-container">

  <!-- Panel izquierdo -->
  <div class="login-info">
  </div>

  <!-- Panel derecho -->
  <div class="login-form-panel">

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="login-logo">
        <img src="logo-biblioteca.png" alt="Biblioteca Universitaria">
      </div>

      <div class="login-subtitle">
        Accede con tu cuenta para reservar salas de estudio,
        consultar tus reservas y administrar tus horarios.
      </div>

      <div class="form-group">
        <label>RUT</label>
        <input
          type="text"
          formControlName="rut"
          placeholder="12.345.678-9"
          maxlength="12"
          (input)="formatearRut($event)"
        >
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          formControlName="password"
          placeholder="********"
        >
      </div>

      <div class="error-msg" *ngIf="error()">
        {{ error() }}
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="cargando() || form.invalid"
      >
        {{ cargando() ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

    </form>

    <div class="separator">
      <span>o</span>
    </div>

    <p class="auth-footer">
      ¿Aún no tienes cuenta?
      <a routerLink="/register">Crear cuenta</a>
    </p>

  </div>

</div>
