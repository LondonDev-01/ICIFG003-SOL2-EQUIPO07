<div class="login-container">

  <!-- Panel izquierdo -->
  <div class="login-info">

    <h1>Inicia sesión para reservar una sala</h1>

    <div class="line"></div>

    <p class="info-text">
      Accede con tu RUT y contraseña para continuar.
    </p>

    <div class="info-box">
      <span class="info-icon">ℹ</span>
      <span>
        Para reservar una sala debes acceder con tu cuenta estudiantil.
      </span>
    </div>

    <img
      src="/login-study-room.png"
      alt="Sala de estudio"
      class="login-image"
    >

  </div>

  <!-- Panel derecho -->
  <div class="login-form-panel">

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>RUT</label>
        <input
          type="text"
          formControlName="rut"
          placeholder="12.345.678-9"
        >
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          formControlName="password"
          placeholder="********"
        >
      </div>

      <div class="error-msg" *ngIf="error()">
        {{ error() }}
      </div>

      <button
        type="submit"
        class="btn-submit"
        [disabled]="cargando() || form.invalid"
      >
        {{ cargando() ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

    </form>

    <div class="separator">
      <span>o</span>
    </div>

    <p class="auth-footer">
      ¿Aún no tienes cuenta?
      <a routerLink="/register">Crear cuenta</a>
    </p>

  </div>

</div>
