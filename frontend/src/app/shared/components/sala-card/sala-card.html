<div class="sala-card">

  <img [src]="imagen" [alt]="nombre">

  <div class="sala-card-content">
    <h3>{{ nombre }}</h3>

    <p>Capacidad: {{ capacidad }} personas</p>

    <p>Edificio/Ubicación: {{ ubicacion }}</p>

    <p>Horario: {{ horario }}</p>

    <div class="acciones">
      <button class="btn-reservas" (click)="onVerReservas()">Ver reservas</button>
      <button class="btn-reservar" (click)="onReservar()">Reservar</button>
    </div>
  </div>

</div>
